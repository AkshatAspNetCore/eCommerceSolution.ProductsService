<text x="109" y="378" text-anchor="middle" font-size="10" fill="#5F5E5A">ACR + AKS (SPN)</text>

<rect x="36" y="394" width="146" height="100" rx="6" fill="#ffffff" stroke="#888780" stroke-width="1"/>
