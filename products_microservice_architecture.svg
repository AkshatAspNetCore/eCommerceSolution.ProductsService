<text x="109" y="425" text-anchor="middle" font-size="9.5" fill="#5F5E5A">akshatecommerceregistry</text>
<line x1="48" y1="431" x2="170" y2="431" stroke="#d0cfc8" stroke-width="1"/>
<text x="109" y="445" text-anchor="middle" font-size="9" fill="#6f6e6a">apigateway &#183; users-microservice</text>
<text x="109" y="457" text-anchor="middle" font-size="9" fill="#6f6e6a">products-microservice</text>
<text x="109" y="469" text-anchor="middle" font-size="9" fill="#6f6e6a">orders-microservice</text>
<text x="109" y="481" text-anchor="middle" font-size="9" fill="#6f6e6a">postgres &#183; mysql &#183; mongodb</text>

<line x1="109" y1="338" x2="109" y2="344" stroke="#6f6e6a" stroke-width="1.5" marker-end="url(#arrowlite)"/>
<line x1="109" y1="386" x2="109" y2="392" stroke="#6f6e6a" stroke-width="1.5" marker-end="url(#arrowlite)"/>

<!-- ACR -> AKS pull (into Products pod left edge) -->
<path d="M182 430 L202 430 L202 292 L222 292" fill="none" stroke="#444441" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="202" y="284" text-anchor="middle" font-size="9.5" fill="#5F5E5A">AKS pulls images</text>

<!-- service connection -> AKS deploy (into cluster top-left) -->
<path d="M182 366 L196 366 L196 312 L222 312" fill="none" stroke="#444441" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="150" y="262" text-anchor="middle" font-size="9.5" fill="#5F5E5A">kubectl / Helm deploy</text>

<!-- legend -->
<text x="380" y="668" text-anchor="middle" font-size="10.5" fill="#888780" font-style="italic">Solid arrows = request / data flow   &#183;   Dashed arrows = CI/CD build &amp; deploy</text>
</svg>
