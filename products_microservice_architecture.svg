<text x="651" y="245" text-anchor="middle" font-size="9.5" font-weight="600" fill="#ffffff">ecommerce-prod</text>

<!-- Gateway service (LoadBalancer) -->
<rect x="300" y="266" width="248" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.4"/>
<text x="424" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">API Gateway (Ocelot) &#8212; Pod</text>
<text x="424" y="301" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Exposed via Service (type: LoadBalancer)</text>
<text x="424" y="315" text-anchor="middle" font-size="10.5" fill="#5F5E5A">External IP &#8594; entry to all pods</text>

<line x1="390" y1="178" x2="390" y2="178" stroke="#444441" stroke-width="0"/>
<!-- APIM arrow already lands at cluster top; add arrow into gateway -->
<line x1="424" y1="252" x2="424" y2="264" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- gateway -> pods -->
<line x1="340" y1="322" x2="305" y2="356" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="424" y1="322" x2="424" y2="356" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="508" y1="322" x2="543" y2="356" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Service pods: Products emphasized -->
<rect x="240" y="358" width="130" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="305" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Users &#8212; Pod</text>
<text x="305" y="395" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Dapper &#183; JWT</text>

<rect x="386" y="352" width="158" height="68" rx="9" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="2"/>
<text x="465" y="378" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Products &#8212; Pod</text>
<text x="465" y="398" text-anchor="middle" font-size="10.5" fill="#d8d7d1">EF Core &#183; this service</text>

<rect x="560" y="358" width="130" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="625" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Orders &#8212; Pod</text>
<text x="625" y="395" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Repository</text>

<!-- pods -> DBs -->
<line x1="305" y1="414" x2="305" y2="444" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="465" y1="420" x2="465" y2="444" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="625" y1="414" x2="625" y2="444" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Databases -->
<rect x="240" y="446" width="130" height="46" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="305" y="464" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">PostgreSQL</text>
<text x="305" y="481" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Users data</text>

<rect x="400" y="446" width="130" height="46" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="465" y="464" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">MySQL</text>
<text x="465" y="481" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Product catalog</text>

<rect x="560" y="446" width="130" height="46" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="625" y="464" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">MongoDB</text>
<text x="625" y="481" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Orders</text>

<!-- RabbitMQ + Redis note boxes (no arrows) -->
<rect x="238" y="512" width="246" height="120" rx="8" fill="#ffffff" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
<text x="252" y="530" font-size="12" font-weight="700" fill="#2C2C2A">RabbitMQ &#8212; async messaging</text>
<text x="252" y="548" font-size="10.5" fill="#5F5E5A">When a product name or price changes,</text>
<text x="252" y="562" font-size="10.5" fill="#5F5E5A">Products publishes an event. Orders</text>
<text x="252" y="576" font-size="10.5" fill="#5F5E5A">consumes it asynchronously and updates</text>
<text x="252" y="590" font-size="10.5" fill="#5F5E5A">its stored product name / price &#8212; so the</text>
<text x="252" y="604" font-size="10.5" fill="#5F5E5A">two services stay decoupled, no direct</text>
<text x="252" y="618" font-size="10.5" fill="#5F5E5A">call needed.</text>

<rect x="496" y="512" width="240" height="120" rx="8" fill="#ffffff" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
<text x="510" y="530" font-size="12" font-weight="700" fill="#2C2C2A">Redis &#8212; distributed cache</text>
<text x="510" y="548" font-size="10.5" fill="#5F5E5A">Frequently read product data is cached</text>
<text x="510" y="562" font-size="10.5" fill="#5F5E5A">in Redis. Reads are served from cache</text>
<text x="510" y="576" font-size="10.5" fill="#5F5E5A">instead of hitting the database, so the</text>
<text x="510" y="590" font-size="10.5" fill="#5F5E5A">app loads faster. The cache is kept in</text>
<text x="510" y="604" font-size="10.5" fill="#5F5E5A">sync by the same product events above</text>
<text x="510" y="618" font-size="10.5" fill="#5F5E5A">(invalidate / update on change).</text>

