<text x="840" y="315" text-anchor="middle" font-size="9.5" fill="#5F5E5A">ecommerce-prod</text>

<rect x="488" y="342" width="248" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.4"/>
