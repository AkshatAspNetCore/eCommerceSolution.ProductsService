<path d="M682 398 L752 398 L752 428" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="408" y="430" width="128" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="472" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Users &#8212; Pod</text>
<text x="472" y="464" text-anchor="middle" font-size="10" fill="#5F5E5A">Dapper &#183; JWT</text>
<text x="472" y="477" text-anchor="middle" font-size="9.5" fill="#6f6e6a">replicas: 1</text>

<rect x="542" y="424" width="140" height="68" rx="9" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="2"/>
<text x="612" y="446" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Products &#8212; Pod</text>
<text x="612" y="463" text-anchor="middle" font-size="10" fill="#d8d7d1">EF Core &#183; this service</text>
<text x="612" y="477" text-anchor="middle" font-size="9.5" fill="#bfbeb8">replicas: 1</text>

<rect x="688" y="430" width="128" height="56" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="752" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Orders &#8212; Pod</text>
<text x="752" y="464" text-anchor="middle" font-size="10" fill="#5F5E5A">Repository</text>
<text x="752" y="477" text-anchor="middle" font-size="9.5" fill="#6f6e6a">replicas: 1</text>

<line x1="472" y1="486" x2="472" y2="514" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="612" y1="492" x2="612" y2="514" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="752" y1="486" x2="752" y2="514" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="408" y="516" width="128" height="52" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="472" y="534" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2C2C2A">PostgreSQL &#8212; Pod</text>
<text x="472" y="548" text-anchor="middle" font-size="9.5" fill="#5F5E5A">Users data</text>
<text x="472" y="560" text-anchor="middle" font-size="9" fill="#6f6e6a">replicas: 1</text>

<rect x="548" y="516" width="128" height="52" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="612" y="534" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2C2C2A">MySQL &#8212; Pod</text>
<text x="612" y="548" text-anchor="middle" font-size="9.5" fill="#5F5E5A">Product catalog</text>
<text x="612" y="560" text-anchor="middle" font-size="9" fill="#6f6e6a">replicas: 1</text>

<rect x="688" y="516" width="128" height="52" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="752" y="534" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2C2C2A">MongoDB &#8212; Pod</text>
<text x="752" y="548" text-anchor="middle" font-size="9.5" fill="#5F5E5A">Orders</text>
<text x="752" y="560" text-anchor="middle" font-size="9" fill="#6f6e6a">replicas: 1</text>

<rect x="430" y="588" width="224" height="88" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="444" y="606" font-size="12" font-weight="700" fill="#2C2C2A">RabbitMQ &#8212; Pod</text>
<text x="640" y="606" text-anchor="end" font-size="9" fill="#6f6e6a">replicas: 1</text>
<text x="444" y="623" font-size="9.5" fill="#5F5E5A">Async messaging. When a product name or</text>
<text x="444" y="637" font-size="9.5" fill="#5F5E5A">price changes, Products publishes an event;</text>
<text x="444" y="651" font-size="9.5" fill="#5F5E5A">Orders consumes it and updates its stored</text>
<text x="444" y="665" font-size="9.5" fill="#5F5E5A">name / price &#8212; services stay decoupled.</text>

<rect x="668" y="588" width="226" height="88" rx="8" fill="#ffffff" stroke="#444441" stroke-width="1.2"/>
<text x="682" y="606" font-size="12" font-weight="700" fill="#2C2C2A">Redis &#8212; Pod</text>
<text x="880" y="606" text-anchor="end" font-size="9" fill="#6f6e6a">replicas: 1</text>
<text x="682" y="623" font-size="9.5" fill="#5F5E5A">Distributed cache. Hot product data is served</text>
<text x="682" y="637" font-size="9.5" fill="#5F5E5A">from cache instead of the database, so the app</text>
<text x="682" y="651" font-size="9.5" fill="#5F5E5A">loads faster. Kept in sync by the same product</text>
<text x="682" y="665" font-size="9.5" fill="#5F5E5A">events (invalidate / update on change).</text>

