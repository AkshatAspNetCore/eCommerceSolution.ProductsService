<rect x="328" y="230" width="78" height="22" rx="5" fill="#ffffff" stroke="#888780" stroke-width="1"/>
<text x="367" y="245" text-anchor="middle" font-size="9.5" fill="#5F5E5A">ecommerce-qa</text>
