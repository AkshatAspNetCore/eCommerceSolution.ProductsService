<!-- ===== AKS cluster ===== -->
<rect x="222" y="180" width="528" height="468" rx="16" fill="#ffffff" stroke="#444441" stroke-width="1.3" stroke-dasharray="6 4"/>
<text x="486" y="201" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Azure Kubernetes Service (AKS)</text>

<!-- namespaces -->
<text x="238" y="224" font-size="10" font-weight="600" fill="#5F5E5A">NAMESPACES</text>
