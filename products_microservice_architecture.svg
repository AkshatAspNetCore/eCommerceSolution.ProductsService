<!-- Branch note below DevOps -->
<rect x="24" y="638" width="320" height="80" rx="8" fill="#ffffff" stroke="#888780" stroke-width="1"/>
<text x="40" y="659" font-size="12" font-weight="700" fill="#2C2C2A">Branch-based deployment</text>
<text x="40" y="677" font-size="10" fill="#5F5E5A">A commit / PR to a branch triggers the pipeline, which</text>
<text x="40" y="691" font-size="10" fill="#5F5E5A">deploys to the matching namespace:</text>
<text x="40" y="707" font-size="10" fill="#2C2C2A">dev &#8594; ecommerce-dev &#183; qa &#8594; ecommerce-qa &#183; &#8230;</text>

<text x="672" y="724" text-anchor="middle" font-size="10.5" fill="#888780" font-style="italic">Solid arrows = request / data flow   &#183;   Dashed arrows = CI/CD build &amp; deploy</text>
</svg>
