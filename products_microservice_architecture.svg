<text x="453" y="245" text-anchor="middle" font-size="9.5" fill="#5F5E5A">ecommerce-uat</text>
<rect x="500" y="230" width="100" height="22" rx="5" fill="#ffffff" stroke="#888780" stroke-width="1"/>
<text x="550" y="245" text-anchor="middle" font-size="9.5" fill="#5F5E5A">ecommerce-staging</text>
