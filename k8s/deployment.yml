apiVersion: apps/v1
kind: Deployment
metadata:
 name: products-microservice-deployment
 labels:
  app: products-microservice
spec:
 replicas: 1
 selector:
  matchLabels:
   app: products-microservice
 template:
  metadata:
   labels:
    app: products-microservice
  spec:
   containers:
   - name: products-microservice
     image: akshatecommerceregistry.azurecr.io/products-microservice:__TAG__
     ports:
      - containerPort: 8080
     env:
      - name: ASPNETCORE_ENVIRONMENT
        value: Development
      - name: MYSQL_HOST
        value: mysql
      - name: MYSQL_PORT
        value: "3306"
      - name: MYSQL_DATABASE
        value: ecommerceproductsdatabase
      - name: MYSQL_USER
        value: root
      - name: MYSQL_PASSWORD
        value: admin
      - name: RABBITMQ_HOST
        value: rabbitmq
      - name: RABBITMQ_PORT
        value: "5672"
      - name: RABBITMQ_USER
        value: admin
      - name: RABBITMQ_PASSWORD
        value: admin
      - name: RABBITMQ_PRODUCTS_EXCHANGE
        value: products.exchange
